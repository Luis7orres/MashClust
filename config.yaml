# ============================================================================
# MARGE Configuration
# ============================================================================

directories:
  output_base: ""
  scripts_dir: "scripts"
  logs_dir: ""

output_structure:
  download: "0-download"
  sketch: "1-sketch"
  distances: "2-distances"
  cluster: "3-cluster"
  visualize: "4-visualize"

results:
  base_dir: "genomes"
  genomes_dir: "uncompressed"
  accessions_file: "selected_accessions.txt"

# Main parameters
params:
  threads: 28
  accessions: ""
  filter_enabled: true
  bacteria_name: ""
  id_threshold: 0.9980                    
  n_representatives: 2
  
  mash:
    sketch_size: 100000
    kmer_size: 31

  quality_filter:
    enabled: true             # Set to false to skip quality filtering
    threshold: 90.0           # Completeness threshold (%)
    
  download:
    keep_zip: false
    batch_size: 1000           # Genomes per batch
    delay: 30                # Seconds between batches
    max_retries: 5           # Retries per batch
    use_api_key: true        # Use NCBI API key for higher rate limits
    api_key: ""  # Get from https://www.ncbi.nlm.nih.gov/account/settings/

# Reference genomes (Optional, but recommended)
reference:
  enabled: true
  accession:
  - ""